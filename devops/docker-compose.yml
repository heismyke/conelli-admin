name: conelli

services:
  conelli-admin-backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: conelli-admin-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${PORT:-8000}
      HOST: conelli-postgres
      DB_USER: ${DB_USER:-myke}
      PASSWORD: ${PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-conelli_admin}
      DB_PORT: 5432
      SSLMODE: ${SSLMODE:-disable}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@conelliengineering.com}
      ADMIN_NAME: ${ADMIN_NAME:-Conelli Admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-conelli}
      AWS_REGION: ${AWS_REGION:-eu-west-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-conelli-dev-assets}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-conelli}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://localhost:9000}
      AWS_S3_PUBLIC_URL: ${AWS_S3_PUBLIC_URL:-http://localhost:9000/conelli-dev-assets}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "${API_PORT:-8000}:${PORT:-8000}"
    depends_on:
      conelli-postgres:
        condition: service_started
      conelli-minio:
        condition: service_healthy
      conelli-minio-init:
        condition: service_completed_successfully

  conelli-postgres:
    image: postgres:16-alpine
    container_name: conelli-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-myke}
      POSTGRES_PASSWORD: ${PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-conelli_admin}
    ports:
      - "${DB_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  conelli-minio:
    image: minio/minio:latest
    container_name: conelli-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  conelli-minio-init:
    image: minio/mc:latest
    container_name: conelli-minio-init
    depends_on:
      conelli-minio:
        condition: service_healthy
    environment:
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-conelli-dev-assets}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://conelli-minio:9000 $${AWS_ACCESS_KEY_ID} $${AWS_SECRET_ACCESS_KEY} &&
      mc mb --ignore-existing local/$${AWS_S3_BUCKET} &&
      mc anonymous set download local/$${AWS_S3_BUCKET}
      "

volumes:
  postgres-data:
  minio-data:
