name: conelli-dev

services:
  conelli-admin-backend:
    extends:
      file: docker-compose.yml
      service: conelli-admin-backend
    environment:
      APP_ENV: development
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174,http://localhost:5175}

  conelli-postgres:
    extends:
      file: docker-compose.yml
      service: conelli-postgres

volumes:
  postgres-data:
